<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            /* Căn giữa toàn bộ nội dung */
            text-align: center;
            /* Đẩy nội dung xuống một chút cho giống hình */
            margin-top: 100px;
            /* Sử dụng font chữ cơ bản không chân */
            font-family: Arial, sans-serif;
        }
        
        .title {
            font-size: 32px;
            font-weight: normal;
        }
        
        .subtitle {
            font-size: 28px;
            font-weight: normal;
            margin-top: 30px;
        }
        /* Lớp CSS dùng để tô màu đỏ cho chữ */
        
        .text-red {
            color: #cc0000;
        }
        
        .dots {
            font-size: 32px;
            letter-spacing: 2px;
            /* Tạo khoảng cách giữa các dấu chấm */
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <div class="title">
        WELCOME TO <span class="text-red">HỌ TÊN SV</span>
    </div>

    <div class="subtitle">
        <span class="text-red">Profile</span><span>: thông tin cá nhân + ảnh</span>
    </div>

    <div class="dots">
        ............
    </div>

</body>

</html>
