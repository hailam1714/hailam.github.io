<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Website đầu tiên</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f4f4f4;
            text-align: center;
        }
        
        header {
            background: #4CAF50;
            color: white;
            padding: 20px;
        }
        
        .container {
            padding: 40px;
        }
        
        button {
            padding: 10px 20px;
            background: #4CAF50;
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
        
        button:hover {
            background: #45a049;
        }
    </style>
</head>

<body>

    <header>
        <h1>🌐 Website đầu tiên của tôi</h1>
    </header>

    <div class="container">
        <h2>Chào bạn!</h2>
        <p>Đây là website mình vừa tạo 🚀</p>

        <button onclick="showMessage()">Bấm vào đây</button>
    </div>

    <script>
        function showMessage() {
            alert("Chúc mừng! Web của bạn đã chạy thành công 🎉");
        }
    </script>

</body>

</body>

</html>
